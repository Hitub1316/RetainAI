version: '3.9'

services:

  frontend:
    build:
      context: ./frontend/my-app
    container_name: retainai-frontend
    ports:
      - "3000:3000"

    depends_on:
      - backend

    stdin_open: true
    tty: true

    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ./backend/backend
    container_name: retainai-backend

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/churn_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  agent:
    build:
      context: ./agent
    container_name: retainai-agent

    ports:
      - "7000:7000"

  mysql:
    image: mysql:8.0
    container_name: retainai-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: churn_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: